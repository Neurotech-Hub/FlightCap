# Unsigned MCUboot images for simple in-house DFU.
# (Anyone with BLE range can flash any image -- acceptable for dev/in-house use.
# Switch to CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y + CONFIG_BOOT_SIGNATURE_KEY_FILE
# when production signing is required.)
CONFIG_BOOT_SIGNATURE_TYPE_NONE=y

# MCUboot is a single-threaded bootloader without BT, sensors, or analog IO.
# The FlightCap board defconfig turns on ADC / I2C / SPI (and their nrfx
# drivers) for the application image, but those subsystems' dependencies are
# not met in MCUboot's reduced kernel config (`MULTITHREADING=n`, no SAADC
# DT node, etc.). Override them off so the merged bootloader .config is
# clean -- otherwise Kconfig emits "assigned 'y' but got 'n'" warnings for
# ADC_NRFX_SAADC, I2C_NRFX, and SPI_NRFX at every bootloader build.
CONFIG_ADC=n
CONFIG_ADC_NRFX_SAADC=n
CONFIG_I2C=n
CONFIG_I2C_NRFX=n
CONFIG_SPI=n
CONFIG_SPI_NRFX=n

# Board DTS enables MX25R8035F (jedec,spi-nor) for the app image only.
# Without this, MCUboot still links spi_nor.c and fails with
# "undefined reference to __device_dts_ord_*" because SPI is off above.
CONFIG_SPI_NOR=n
