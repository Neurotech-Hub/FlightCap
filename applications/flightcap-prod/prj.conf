# FlightCap production firmware (Phase 1: motion counter + I2C bring-up)
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_SPI_NRFX=y

# I2C is enabled in the FlightCap board defconfig (CONFIG_I2C / CONFIG_I2C_NRFX);
# the &i2c1 node in the board DTS provides the SDA/SCL pinout and 100 kHz clock.

# Logging over RTT
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_SEGGER_RTT_MODE_NO_BLOCK_SKIP=y
CONFIG_UART_CONSOLE=n

# Name the VL53L4CD reader thread for RTT debugging.
CONFIG_THREAD_NAME=y

# Bluetooth LE peripheral: motion + distance telemetry GATT service.
# SoftDevice Controller is the NCS default link-layer selection for nRF52840
# so no explicit CONFIG_BT_LL_* is needed. TX power is set per app (rather
# than in the FlightCap board defconfig) so MCUboot's bootloader image
# doesn't see a BT-controller assignment with no BT subsystem under it.
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="FlightCap"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1
CONFIG_BT_HCI_ERR_TO_STR=y
CONFIG_BT_CTLR_TX_PWR_ANTENNA=8

# BLE link tuning so MCUmgr image uploads run at a usable speed (the FCP
# motion/distance characteristics only need 4 bytes, so this is purely for DFU).
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251

# Flash subsystem required for MCUboot image staging via mcumgr.
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# MCUmgr SMP-over-BLE DFU. Always-on alongside the FCP telemetry service:
# the SMP service is auto-registered at bt_enable() (no DYNAMIC_SVC_REGISTRATION
# flag, no manual smp_bt_register() call). MCUmgr's own transport workqueue keeps
# image staging off the system workqueue.
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=1024
CONFIG_MCUMGR_TRANSPORT_WORKQUEUE_STACK_SIZE=4096

# Heap headroom for MCUmgr SMP packet buffers (was 4096 pre-DFU).
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Stacks for sensor + logging + bus init + BLE host
CONFIG_MAIN_STACK_SIZE=6144
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# P0.09/P0.10 are NFC pins on nRF52840; LED0 uses P0.09.
CONFIG_NFCT_PINS_AS_GPIOS=y
