sample:
  name: FlightCap Accelerometer Tester
  description: >
    LIS2DH12 SPI Mode 0 bring-up app for FlightCap with RTT telemetry and
    motion interrupt logging on INT1.

common:
  tags:
    - flightcap
    - accelerometer
    - lis2dh12
    - spi
    - gpio

tests:
  applications.flightcap-axy:
    platform_allow:
      - FlightCap_nRF52840
    harness: console
