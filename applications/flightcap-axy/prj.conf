# FlightCap accelerometer tester application
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_I2C_NRFX=y
CONFIG_ADC=y

# flightcap_hw.c pulls in vl53l0x helpers (tof check unused at runtime).
CONFIG_SENSOR=y
CONFIG_VL53L0X=y

# External MX25R8035 not populated — disable SPI NOR driver.
CONFIG_SPI_NOR=n

# To log external flash present/absent at boot, enable both:
# CONFIG_SPI_NOR=y
# CONFIG_FLASH_JESD216_API=y
# CONFIG_FLASH=y
# CONFIG_FLASH_PAGE_LAYOUT=y

# Logging over RTT
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_SEGGER_RTT_MODE_NO_BLOCK_SKIP=y
CONFIG_UART_CONSOLE=n

# Keep stacks moderate for sensor + logging
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
