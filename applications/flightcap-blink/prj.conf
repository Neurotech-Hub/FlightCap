# Minimal FlightCap blink + magnet override bring-up
CONFIG_GPIO=y

# Logging over RTT
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=n

# Main stack: GPIO + log work
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024

# P0.09/P0.10 are NFC pins on nRF52840; repurpose as GPIO for LED on P0.09.
CONFIG_NFCT_PINS_AS_GPIOS=y
