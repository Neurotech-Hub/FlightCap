sample:
  name: FlightCap LED Blink Bring-up
  description: >
    Hardware bring-up test for FlightCap. LED0 and LED1 blink at 200 ms unless
    MAG_INT is active (magnet present), in which case both LEDs are held on.

common:
  tags:
    - flightcap
    - bringup
    - gpio
    - magnet
    - led

tests:
  applications.flightcap-blink:
    platform_allow:
      - FlightCap_nRF52833
    harness: console
