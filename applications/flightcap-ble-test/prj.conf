# FlightCap BLE peripheral: GATT LED, magnet-wake sleep
CONFIG_GPIO=y
CONFIG_ADC=y

CONFIG_HEAP_MEM_POOL_SIZE=4096

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="FlightCap-BLE"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1
CONFIG_BT_HCI_ERR_TO_STR=y

# Radiated TX power: +8 dBm (SoftDevice Controller; nearest supported level
# is used). Set here rather than in the board defconfig so it isn't applied
# to sysbuild child images that don't build the BT controller.
CONFIG_BT_CTLR_TX_PWR_ANTENNA=8

# Logging over RTT
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=n

CONFIG_MAIN_STACK_SIZE=6144
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# sys_poweroff() for deep-sleep GATT path (nRF52 implements z_sys_poweroff).
CONFIG_POWEROFF=y
