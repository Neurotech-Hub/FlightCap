# Juxta5-8 field updates use unsigned MCUboot images for local SMP DFU.
CONFIG_BOOT_SIGNATURE_TYPE_NONE=y

# The board's external NOR node relies on SFDP read at runtime rather than a
# fixed `jedec-id`; MCUboot builds the same flash driver and needs this too.
CONFIG_SPI_NOR_SFDP_RUNTIME=y

# MCUboot only needs the nRF52840 internal flash. The application uses SAADC
# and external SPI NOR, but enabling those board peripherals in MCUboot pulls in
# drivers that are not part of the minimal bootloader kernel configuration.
CONFIG_ADC=n
CONFIG_SPI_NOR=n
CONFIG_SPI=n
