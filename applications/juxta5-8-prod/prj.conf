# Juxta5-8 production firmware: Hublink BLE + NOR CSV logging

CONFIG_GPIO=y
CONFIG_ADC=y

# SAADC gates analog front-end via runtime PM inside each adc_read.
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

CONFIG_SPI=y
CONFIG_SPI_NRFX=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_RUNTIME=y

# Internal nRF52840 flash settings store.
# Default NVS: 2 sectors × 4 KB = 8 KB of the 64 KB storage_partition.
# The reduced log-cache struct (~520 bytes) fits comfortably in two sectors.
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH_MAP=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# GATT client role required for bt_gatt_exchange_mtu() (MTU negotiation).
CONFIG_BT_GATT_CLIENT=y

# Bluetooth Hublink peripheral + observer.
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="JX_CONNECT"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
# Advertise peripheral preferred connection parameters in the GATT GAP service
# so iOS can read our preferences before the explicit update request.
CONFIG_BT_GAP_PERIPHERAL_PREF_PARAMS=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=24
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=40
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
CONFIG_BT_MAX_CONN=1
CONFIG_BT_HCI_ERR_TO_STR=y

# Match legacy juxta-ble transfer envelope.
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_SMP=n
CONFIG_BT_SIGNING=n
CONFIG_BT_ATT_PREPARE_COUNT=0
CONFIG_BT_PRIVACY=n
CONFIG_BT_SETTINGS=n
CONFIG_BT_BUF_EVT_RX_COUNT=2
CONFIG_BT_BUF_EVT_DISCARDABLE_COUNT=2

# MCUboot image upload over mcumgr SMP BLE (DFU mode after long magnet hold).
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_TRANSPORT_BT_DYNAMIC_SVC_REGISTRATION=y
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=1024
CONFIG_MCUMGR_TRANSPORT_WORKQUEUE_STACK_SIZE=4096

# Logging over RTT.
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_SEGGER_RTT_MODE_BLOCK_IF_FIFO_FULL=y
CONFIG_UART_CONSOLE=n

CONFIG_MAIN_STACK_SIZE=16384
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_ISR_STACK_SIZE=2048
CONFIG_BT_RX_STACK_SIZE=4096
CONFIG_BT_HCI_TX_STACK_SIZE=1536
CONFIG_HEAP_MEM_POOL_SIZE=8192

# P0.09 is NFC; use as GPIO for LED0.
CONFIG_NFCT_PINS_AS_GPIOS=y

# sys_poweroff() for shelf mode (nRF52840 System OFF, magnet GPIO wake).
CONFIG_POWEROFF=y
# sys_reboot() for debug simulation loop (shelf mode emulation with J-Link).
CONFIG_REBOOT=y

# Watchdog and production reliability.
CONFIG_WATCHDOG=y
CONFIG_WDT_NRFX=y

CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
CONFIG_NEWLIB_LIBC_FLOAT_SCANF=y
CONFIG_DEBUG_THREAD_INFO=y
CONFIG_ASSERT=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_HW_STACK_PROTECTION=y
CONFIG_STACK_SENTINEL=y
CONFIG_FAULT_DUMP=2
